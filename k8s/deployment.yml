apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: opentraum
  labels:
    app: web
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: web
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-web:e39f8763e71f9df00ef838e1cc5774c49b2f5b47
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
