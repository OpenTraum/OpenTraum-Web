apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: opentraum
  labels:
    app: web
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: web
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-web:991c0d236b393870eb7d965378dd259733210967
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
